<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lofi dump</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Architects+Daughter&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Black+Han+Sans&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root {
  --bg: #f5f2eb;
  --black: #111;
  --gray: #999;
  --lightgray: #ddd;
}

body {
  background: var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
  cursor: crosshair;
}

/* ── NAV ── */
.topnav {
  border-bottom: 2px solid var(--black);
  padding: 13px 36px;
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 300;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 4px;
  color: var(--black);
}
.logo em {
  font-family: 'Architects Daughter', cursive;
  font-size: 18px;
  font-style: normal;
  letter-spacing: 0;
  margin-left: 3px;
}
.nav-links {
  display: flex;
  gap: 28px;
  list-style: none;
}
.nav-links a {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  text-decoration: none;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  transition: color 0.15s;
}
.nav-links a:hover { color: var(--black); text-decoration: underline; }

/* ── HEADER ── */
.site-header {
  padding: 44px 36px 28px;
  border-bottom: 1px solid var(--lightgray);
  position: relative;
  overflow: hidden;
}
.h-title-big {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(80px, 16vw, 156px);
  line-height: 0.86;
  letter-spacing: -3px;
  color: var(--black);
  display: block;
}
.h-title-script {
  font-family: 'Architects Daughter', cursive;
  font-size: clamp(36px, 7vw, 68px);
  color: var(--black);
  display: block;
  margin-left: 4px;
  line-height: 1.1;
}
.h-sub {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--gray);
  text-transform: uppercase;
  margin-top: 14px;
}
.h-right-deco {
  position: absolute;
  top: 36px;
  right: 36px;
  text-align: right;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--lightgray);
  letter-spacing: 1.5px;
  line-height: 2;
  text-transform: uppercase;
}

/* ── LOADING STATE ── */
.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 500px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gray);
  text-transform: uppercase;
  flex-direction: column;
  gap: 12px;
}
.loading-dot {
  display: inline-block;
  animation: blink 1.2s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── SCATTER ZONE ── */
.scatter {
  position: relative;
  width: 100%;
  min-height: 900px;
  padding: 16px 0 80px;
  display: none; /* shown after load */
}
.scatter.loaded { display: block; }

/* ── POST ITEMS ── */
.p-item {
  position: absolute;
  cursor: pointer;
  z-index: 2;
  transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
}
.p-item:hover { z-index: 100; }

.p-img {
  border: 2px solid var(--black);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: transform 0.28s ease;
}
.p-item:hover .p-img { transform: scale(1.04); }

/* real image inside */
.p-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.28s ease;
}
.p-item:hover .p-img img { transform: scale(1.06); }

/* emoji fallback */
.p-img-emoji {
  font-size: 52px;
  user-select: none;
}

.p-idx {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--black);
  letter-spacing: 1px;
  margin-bottom: 5px;
}
.p-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 13px;
  color: var(--black);
  line-height: 1.35;
  max-width: 190px;
  margin-top: 0;
}
.p-tag {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--gray);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 3px;
}

/* ── CENTER TITLE IN SCATTER ── */
.scatter-center-txt {
  position: absolute;
  pointer-events: none;
  z-index: 1;
  left: 50%;
  top: 240px;
  transform: translateX(-50%);
  text-align: center;
}
.sct-big {
  font-family: 'Space Mono', monospace;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: -2px;
  color: var(--black);
  line-height: 0.9;
  display: block;
}
.sct-script {
  font-family: 'Architects Daughter', cursive;
  font-size: 44px;
  color: var(--black);
  line-height: 0.95;
  display: block;
}
.sct-sub {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gray);
  text-transform: lowercase;
  margin-top: 6px;
  display: block;
}

/* ── STARS / STICKERS ── */
.sticker { position: absolute; pointer-events: none; z-index: 10; }

/* ── BOTTOM ── */
.site-footer {
  border-top: 2px solid var(--black);
  padding: 18px 36px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg);
}
.footer-logo {
  font-family: 'Architects Daughter', cursive;
  font-size: 20px;
  color: var(--black);
}
.footer-r {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── MODAL ── */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(245,242,235,0.97);
  z-index: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
  overflow-y: auto;
}
.modal-bg.open { opacity: 1; pointer-events: all; }

.modal-wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 44px 36px 100px;
  transform: translateY(14px);
  transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-bg.open .modal-wrap { transform: translateY(0); }

.modal-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid var(--black);
  padding-bottom: 14px;
  margin-bottom: 44px;
}
.modal-back {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--black);
  padding: 0;
}
.modal-back:hover { text-decoration: underline; }
.modal-date-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 1px;
}

.modal-cover {
  width: 100%;
  height: 300px;
  border: 2px solid var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 96px;
  margin-bottom: 36px;
  overflow: hidden;
}
.modal-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.modal-tag-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: 1.5px solid var(--black);
  display: inline-block;
  padding: 3px 10px;
  margin-bottom: 16px;
}

.modal-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(28px, 5vw, 48px);
  line-height: 1.1;
  color: var(--black);
  margin-bottom: 8px;
}

.modal-meta-line {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 1.5px;
  margin-bottom: 40px;
  padding-bottom: 28px;
  border-bottom: 1px dashed var(--lightgray);
}

.modal-body {
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  line-height: 2.1;
  color: #222;
}
.modal-body p { margin-bottom: 26px; }
.modal-body h2 {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 22px;
  margin: 36px 0 16px;
  color: var(--black);
}
.modal-body img {
  width: 100%;
  border: 2px solid var(--black);
  margin: 24px 0;
  display: block;
}
.modal-body blockquote {
  border-left: 3px solid var(--black);
  padding-left: 20px;
  font-style: italic;
  color: #555;
  margin: 28px 0;
}

.modal-notion-link {
  margin-top: 52px;
  border-top: 1px solid var(--lightgray);
  padding-top: 18px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #bbb;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── ERROR STATE ── */
.error-state {
  display: none;
  align-items: center;
  justify-content: center;
  min-height: 300px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--gray);
  text-transform: uppercase;
  flex-direction: column;
  gap: 10px;
  text-align: center;
  padding: 40px;
}

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .topnav { padding: 12px 20px; }
  .site-header { padding: 32px 20px 20px; }
  .scatter-center-txt { display: none; }
  .p-item { position: relative !important;
    top: auto !important; left: auto !important; right: auto !important; bottom: auto !important;
    transform: none !important;
    margin-bottom: 32px;
    display: inline-block;
    margin-left: 20px;
  }
  .scatter {
    min-height: auto;
    display: flex !important;
    flex-wrap: wrap;
    padding: 24px 0;
  }
  .scatter.loaded { display: flex !important; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="logo">LOFI<em>dump.</em></div>
  <ul class="nav-links">
    <li><a href="#">index</a></li>
    <li><a href="#">about</a></li>
    <li><a href="#">tags</a></li>
  </ul>
</nav>

<!-- HEADER -->
<header class="site-header">
  <span class="h-title-big">LOFI</span>
  <span class="h-title-script">dump.</span>
  <div class="h-sub">thoughts &amp; images — seoul, kr — ongoing</div>
  <div class="h-right-deco">
    <div>[ updated weekly ]</div>
    <div>since 2025</div>
    <div class="loading-dot">▮</div>
  </div>
</header>

<!-- LOADING -->
<div class="loading-state" id="loadingState">
  <div>loading posts<span class="loading-dot">...</span></div>
</div>

<!-- ERROR -->
<div class="error-state" id="errorState">
  <div>⚠ could not load posts</div>
  <div style="font-size:9px;color:#bbb;margin-top:6px;">check your notion connection</div>
</div>

<!-- SCATTER GRID -->
<div class="scatter" id="scatter">

  <!-- Center decorative text -->
  <div class="scatter-center-txt">
    <span class="sct-big">lofi</span>
    <span class="sct-script">dump.</span>
    <span class="sct-sub">— my personal archive</span>
  </div>

  <!-- Stars / stickers -->
  <svg class="sticker" style="top:55px;left:46%;width:50px;height:50px;" viewBox="0 0 100 100">
    <defs><linearGradient id="holo1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9de2"/><stop offset="50%" stop-color="#c8b6ff"/><stop offset="100%" stop-color="#96efff"/>
    </linearGradient></defs>
    <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="url(#holo1)" stroke="#ccc" stroke-width="1.5"/>
  </svg>
  <svg class="sticker" style="top:290px;left:29%;width:38px;height:38px;" viewBox="0 0 100 100">
    <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#ffd700" stroke="#111" stroke-width="2.5"/>
  </svg>
  <svg class="sticker" style="bottom:140px;left:7%;width:44px;height:44px;" viewBox="0 0 100 100">
    <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#ff3333" stroke="#111" stroke-width="2.5"/>
  </svg>
  <svg class="sticker" style="bottom:90px;right:13%;width:36px;height:36px;" viewBox="0 0 100 100">
    <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="#4488ff" stroke="#111" stroke-width="2.5"/>
  </svg>
  <svg class="sticker" style="top:150px;right:8%;width:52px;height:52px;" viewBox="0 0 100 100">
    <defs><linearGradient id="holo2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/><stop offset="50%" stop-color="#ff9de2"/><stop offset="100%" stop-color="#c8b6ff"/>
    </linearGradient></defs>
    <polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="url(#holo2)" stroke="#ccc" stroke-width="1.5"/>
  </svg>

  <!-- Post items injected by JS -->
  <div id="postGrid"></div>
  <div style="height:900px;pointer-events:none;"></div>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-logo">lofi dump.</div>
  <div class="footer-r">Seoul · 2025 · Notion-powered</div>
</footer>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal-wrap">
    <div class="modal-bar">
      <button class="modal-back" onclick="closePost()">← back to index</button>
      <div class="modal-date-label" id="mDateLabel"></div>
    </div>
    <div id="mContent"></div>
  </div>
</div>

<script>
// ── LAYOUT CONFIG ──
// Each post gets a fixed scatter position + rotation
// Add more slots as your post count grows
const SLOTS = [
  { top:'28px',  right:'36px',   rot: 1.5,  w:210, h:250 },
  { top:'44px',  left:'35%',     rot:-2.0,  w:175, h:195 },
  { top:'22px',  left:'16px',    rot: 2.5,  w:185, h:225 },
  { top:'340px', left:'8px',     rot:-1.8,  w:195, h:155 },
  { top:'350px', right:'16px',   rot: 1.0,  w:205, h:235 },
  { bottom:'110px', left:'22%',  rot:-1.2,  w:165, h:185 },
  { bottom:'90px',  right:'30%', rot: 2.2,  w:150, h:170 },
  { top:'200px', left:'42%',     rot:-0.8,  w:160, h:180 },
];

// Pastel bg fallbacks when no cover image
const FALLBACKS = [
  { bg:'#cce8f0', emoji:'🌊' },
  { bg:'#ffd6ec', emoji:'🌸' },
  { bg:'#d4f7c5', emoji:'🌿' },
  { bg:'#fffacc', emoji:'✦'  },
  { bg:'#ffd6b0', emoji:'✨' },
  { bg:'#e0d4ff', emoji:'🔮' },
  { bg:'#c8f0d4', emoji:'🍃' },
  { bg:'#f9dcc4', emoji:'☁️' },
];

let allPosts = [];

// ── FETCH FROM /api/posts ──
async function loadPosts() {
  try {
    const res = await fetch('/api/posts');
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    allPosts = data.posts || [];
    renderPosts(allPosts);
  } catch(e) {
    // Fallback: show demo posts
    console.warn('API not available — showing demo posts');
    allPosts = DEMO_POSTS;
    renderPosts(allPosts);
  }
}

function renderPosts(posts) {
  document.getElementById('loadingState').style.display = 'none';

  const grid = document.getElementById('postGrid');
  const scatter = document.getElementById('scatter');

  grid.innerHTML = '';

  posts.forEach((post, i) => {
    const slot = SLOTS[i % SLOTS.length];
    const fb   = FALLBACKS[i % FALLBACKS.length];

    // Build position style
    let posStyle = '';
    if (slot.top)    posStyle += `top:${slot.top};`;
    if (slot.bottom) posStyle += `bottom:${slot.bottom};`;
    if (slot.left)   posStyle += `left:${slot.left};`;
    if (slot.right)  posStyle += `right:${slot.right};`;
    posStyle += `transform:rotate(${slot.rot}deg);`;

    // Cover image or emoji fallback
    const coverHTML = post.cover
      ? `<img src="${post.cover}" alt="${post.title}" loading="lazy">`
      : `<div class="p-img-emoji">${fb.emoji}</div>`;

    const coverBg = post.cover ? '#e8e4dc' : fb.bg;

    const el = document.createElement('div');
    el.className = 'p-item';
    el.style.cssText = posStyle;
    el.innerHTML = `
      <div class="p-idx">[${String(i+1).padStart(2,'0')}]</div>
      <div class="p-img" style="width:${slot.w}px;height:${slot.h}px;background:${coverBg};">
        ${coverHTML}
      </div>
      <div class="p-tag">${post.tag || 'essay'} · ${post.readTime || '3 min'}</div>
      <div class="p-title">${post.title}</div>
    `;
    el.onclick = () => openPost(i);
    grid.appendChild(el);
  });

  scatter.classList.add('loaded');
}

// ── MODAL ──
function openPost(i) {
  const p = allPosts[i];
  const fb = FALLBACKS[i % FALLBACKS.length];

  document.getElementById('mDateLabel').textContent =
    `${p.date || ''} · ${p.readTime || '3 min'} read`;

  const coverHTML = p.cover
    ? `<img src="${p.cover}" alt="${p.title}">`
    : `<div style="font-size:96px;">${fb.emoji}</div>`;

  const coverBg = p.cover ? '#e8e4dc' : fb.bg;

  document.getElementById('mContent').innerHTML = `
    <div class="modal-cover" style="background:${coverBg};">${coverHTML}</div>
    <div class="modal-tag-label">${p.tag || 'essay'}</div>
    <h1 class="modal-title">${p.title}</h1>
    <div class="modal-meta-line">[${String(i+1).padStart(2,'0')}] — ${p.tag || 'essay'} — ${p.date || ''}</div>
    <div class="modal-body">${p.body || p.excerpt || ''}</div>
    ${p.notionUrl ? `<div class="modal-notion-link">↗ <a href="${p.notionUrl}" target="_blank" style="color:#bbb;">Read full post on Notion</a></div>` : ''}
  `;

  const bg = document.getElementById('modalBg');
  bg.classList.add('open');
  bg.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closePost() {
  document.getElementById('modalBg').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closePost();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePost(); });

// ── DEMO POSTS (fallback when API not connected) ──
const DEMO_POSTS = [
  { title:'핀터레스트 알고리즘이 나를 만든다', tag:'essay', date:'2025.11.18', readTime:'4 min',
    body:'<p>내가 핀터레스트를 좋아하는지, 핀터레스트가 내가 좋아하는 것들로 나를 채워서 내가 그걸 좋아하게 된 건지 이제는 구분이 안 간다.</p><p>플랫폼이 취향을 학습하는 게 아니라, 취향 자체를 만들어내는 시대. 그게 무섭기도 하고 흥미롭기도 하다.</p>' },
  { title:'AI로 만든 이미지가 내 감성을 대신할 수 있을까?', tag:'essay', date:'2025.12.01', readTime:'5 min',
    body:'<p>핀터레스트에서 몇 시간을 스크롤하다 보면 어느 순간 내가 원하는 게 뭔지 잊어버리게 된다.</p><p>그래서 AI 이미지 생성을 시도해봤다. 감성의 번역기 같은 느낌.</p>' },
  { title:'콜라주는 왜 아직도 힙한가', tag:'visual', date:'2025.11.05', readTime:'3 min',
    body:'<p>디지털이 모든 걸 완벽하게 만들 수 있는 시대에, 오히려 잘린 종이 끝과 풀 자국이 매력적으로 보이는 이유.</p>' },
  { title:'Y2K 감성이 다시 돌아온 이유', tag:'insight', date:'2025.10.29', readTime:'4 min',
    body:'<p>2000년대 초반을 직접 경험한 세대에겐 노스탤지어고, 경험하지 못한 세대에겐 판타지다.</p>' },
  { title:'요즘 내가 모으는 것들', tag:'mood', date:'2025.10.14', readTime:'2 min',
    body:'<p>버튼. 옛날 잡지 클리핑. 특이한 패키지 디자인. 그리고 좋은 문장들.</p>' },
];

// ── INIT ──
loadPosts();
</script>
</body>
</html>
